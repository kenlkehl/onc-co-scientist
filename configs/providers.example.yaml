# Example provider configs consumed by onc_co_scientist.providers.registry.get_provider.
# Providers are used internally (synthetic-data LLM assist, LLM-based hypothesis
# matching). They are NOT used to run the benchmark loop itself.
anthropic_vertex:
  kind: anthropic_vertex
  model_id: claude-sonnet-4-6
  # region: us-east5          # or $CLOUD_ML_REGION
  # project_id: my-gcp-project  # or $ANTHROPIC_VERTEX_PROJECT_ID
  max_retries: 2

vllm_llama:
  kind: vllm_openai
  model_id: meta-llama/Llama-3.3-70B-Instruct
  base_url: http://localhost:8000/v1
  api_key: EMPTY
  timeout_s: 120.0
