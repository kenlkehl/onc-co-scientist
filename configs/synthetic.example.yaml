# Example config for `ocs synth generate`.
# Values match fields on GeneratorConfig; see src/onc_co_scientist/synthetic/generator.py
dataset_id: ds001
# Default cohort size is large so statistical power is not the bottleneck for
# recovering even multi-feature subgroup signals; the eval is then a question
# of whether the agent reaches the right analysis.
patient_n: 50000
seed: 0
# Multi-feature buried-finding count. Each entry comes from
# paradigms.buried_signature_catalog() and is a treatment-conditional
# subgroup defined by 3-4 baseline features in conjunction.
n_buried_signatures: 1
# Legacy paradigm-mix counters. Off by default — set above zero only for
# legacy/comparison runs that want the original concordant/discordant/
# hidden-novel mix layered on top of (or in place of) the buried signature.
n_concordant: 0
n_discordant: 0
n_hidden_novel: 0
backend: builtin           # options: builtin | onc_causal_inference
# Outcome noise SD (months for PFM, units of log-odds for OR). Reduced from
# 3.0 to 2.0 because background-prognostic effects on ECOG, stage_iv, brain
# mets, albumin, weight loss, LDH, and CRP now provide realistic structural
# variance — these are NOT paradigm-tagged and not scored, but they keep the
# cohort from looking implausibly noiseless.
continuous_outcome_sigma: 2.0
# Number of realistic-looking "distractor" covariates appended to the dataset.
# Each is sampled independently of every outcome, so they carry no
# ground-truth signal; their purpose is to force agents to exercise
# variable-selection judgment instead of brute-forcing a univariate test
# against every column. Max is the size of DEFAULT_DISTRACTOR_POOL in
# src/onc_co_scientist/synthetic/distractors.py. Override at invocation
# time with `--n-extra-covariates N`.
n_extra_covariates: 100
# Optional: override marginal prevalences for selected covariates. Providing
# an override for a conditionally-sampled column (e.g. egfr_mutation, which by
# default is drawn conditional on smoking_status) collapses it to a flat
# Bernoulli at the given rate.
# Examples:
#   egfr_mutation: 0.25
#   stk11_mutation: 0.20
#   treatment_pembrolizumab: 0.50
covariate_prevalences: {}
