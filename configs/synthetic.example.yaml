# Example config for `ocs synth generate`.
# Values match fields on GeneratorConfig; see src/onc_co_scientist/synthetic/generator.py.
#
# A single config drives every cancer type the CLI generates: by default
# `ocs synth generate --config <this file> --out <dir>` produces NSCLC, CRC,
# breast, prostate, and AML bundles under <dir>/<cancer_type>/. Pass
# `--cancer-types nsclc,crc` (etc.) to restrict the run to a subset. The
# `dataset_id` below is treated as a group label; each per-cancer manifest
# carries an auto-suffixed identifier such as `ds001_nsclc`, `ds001_crc`, ...
dataset_id: ds001
# Optional: pin a single cancer type when invoking `generate_dataset` from
# Python. Ignored by the CLI, which uses --cancer-types instead.
cancer_type: nsclc
patient_n: 50000
seed: 0
# Multi-feature buried-finding count. Each entry comes from the active
# profile's buried_signature_catalog() and is a treatment-conditional
# subgroup defined by 3-4 baseline features in conjunction.
n_buried_signatures: 1
# Legacy paradigm-mix counters. Off by default — set above zero only for
# legacy/comparison runs that want the original concordant/discordant/
# hidden-novel mix layered on top of (or in place of) the buried signature.
n_concordant: 0
n_discordant: 0
n_hidden_novel: 0
backend: builtin           # options: builtin | onc_causal_inference (NSCLC-only)
# Outcome noise SD (months for PFS, units of log-odds for OR). Background-
# prognostic effects on disease-burden variables provide realistic structural
# variance — these are NOT paradigm-tagged and not scored, but they keep the
# cohort from looking implausibly noiseless.
continuous_outcome_sigma: 2.0
# Number of realistic-looking "distractor" covariates appended to the dataset.
# Each is sampled independently of every outcome, so they carry no
# ground-truth signal; their purpose is to force agents to exercise
# variable-selection judgment instead of brute-forcing a univariate test
# against every column. Max is the size of DEFAULT_DISTRACTOR_POOL in
# src/onc_co_scientist/synthetic/distractors.py. Override at invocation
# time with `--n-extra-covariates N`. Distractor specs whose name collides
# with a profile's base-frame column (e.g. `cea_ng_ml` for CRC, `psa_ng_ml`
# for prostate) are silently skipped, so the same value is safe across all
# cancer types.
n_extra_covariates: 100
# Optional: override marginal prevalences for selected covariates. Keys that
# do not appear in a given cancer profile's frame are silently ignored, so a
# single override block is safe across all cancer types.
# Examples:
#   egfr_mutation: 0.25       # NSCLC
#   msi_high: 0.10            # CRC and prostate
#   her2_positive: 0.20       # breast
#   tp53_mutation: 0.15       # AML
covariate_prevalences: {}
