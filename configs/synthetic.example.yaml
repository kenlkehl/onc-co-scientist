# Example config for `oom synth generate`.
# Values match fields on GeneratorConfig; see src/onc_open_mindedness/synthetic/generator.py
dataset_id: ds001
patient_n: 500
seed: 0
n_concordant: 2
n_discordant: 1
n_hidden_novel: 1
backend: builtin           # options: builtin | onc_causal_inference
continuous_outcome_sigma: 3.0
# Number of realistic-looking "distractor" covariates appended to the dataset.
# Each is sampled independently of every outcome, so they carry no
# ground-truth signal; their purpose is to force agents to exercise
# variable-selection judgment instead of brute-forcing a univariate test
# against every column. Max is the size of DEFAULT_DISTRACTOR_POOL in
# src/onc_open_mindedness/synthetic/distractors.py. Override at invocation
# time with `--n-extra-covariates N`.
n_extra_covariates: 100
# Optional: override marginal prevalences for selected covariates. Providing
# an override for a conditionally-sampled column (e.g. egfr_mutation, which by
# default is drawn conditional on smoking_status) collapses it to a flat
# Bernoulli at the given rate.
# Examples:
#   egfr_mutation: 0.25
#   stk11_mutation: 0.20
#   treatment_pembrolizumab: 0.50
covariate_prevalences: {}
